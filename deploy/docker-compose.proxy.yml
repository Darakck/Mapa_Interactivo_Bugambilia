services:
  nginx:
    image: nginx:1.27
    container_name: bugambilia_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/bugambilia.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_etc:/etc/letsencrypt
    depends_on:
      - app
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: bugambilia_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_etc:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done"
    restart: unless-stopped

volumes:
  certbot_www:
  certbot_etc: