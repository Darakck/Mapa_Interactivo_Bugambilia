<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Editor - Bugambilia</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        .app {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #1b1f23;
            color: #e6edf3;
        }

        .topbar {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,.08);
            background: #0f1419;
        }

        .content {
            flex: 1;
            display: grid;
            grid-template-columns: 440px 1fr;
            gap: 10px;
            padding: 10px;
        }

        .panel {
            background: #0f1419;
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 6px;
            overflow: hidden;
        }

        #map {
            height: 100%;
            width: 100%;
            background: #0b0f14;
            min-height: 320px;
        }

        textarea {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .content {
                grid-template-columns: 1fr;
            }

            #map {
                height: 55vh;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar d-flex justify-content-between align-items-center">
            <div>
                <strong>Editor - Bugambilia</strong>
                <span class="text-secondary small">Selecciona un lote, cambia estado o haz click en el mapa para guardar posición</span>
            </div>
            <form method="post" action="/auth/logout" class="m-0">
                <button class="btn btn-sm btn-outline-light">Salir</button>
            </form>
        </div>

        <div class="content">
            <div class="panel p-3">
                <div class="mb-2">
                    <label class="form-label">Lote seleccionado</label>
                    <select id="lotSelect" class="form-select form-select-sm"></select>

                    <div class="d-flex gap-2 mt-2 flex-wrap">
                        <button id="refreshBtn" class="btn btn-sm btn-outline-light">Actualizar lotes</button>
                        <button id="focusBtn" class="btn btn-sm btn-outline-info">Centrar</button>
                        <button id="debugBtn" class="btn btn-sm btn-outline-warning">Debug lote</button>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Estado</label>
                    <select id="statusSelect" class="form-select form-select-sm">
                        <option value="Available">Disponible</option>
                        <option value="Reserved">Reservado</option>
                        <option value="Sold">Vendido</option>
                        <option value="ComingSoon">Próximamente</option>
                    </select>
                    <button id="saveStatus" class="btn btn-sm btn-primary mt-2">Guardar estado</button>
                </div>

                <hr class="border-secondary" />

                <div class="mb-2">
                    <label class="form-label">Importar TXT</label>
                    <textarea id="txt" class="form-control form-control-sm" rows="10" placeholder="Pega aquí el contenido completo de Lotes Bugambilia.txt"></textarea>
                    <button id="importBtn" class="btn btn-sm btn-success mt-2">Importar a Base de Datos</button>
                </div>

                <div id="msg" class="small text-secondary mt-2"></div>
                <div id="debug" class="small text-secondary mt-2" style="white-space:pre-wrap;"></div>
            </div>

            <div class="panel">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const projectKey = "bugambilia";
        const imageUrl = "/assets/bugambilia-plan.png";
        const imageWidth = 3072;
        const imageHeight = 2304;

        const map = L.map('map', { crs: L.CRS.Simple, minZoom: -3, maxZoom: 4 });
        const bounds = [[0, 0], [imageHeight, imageWidth]];
        L.imageOverlay(imageUrl, bounds).addTo(map);
        map.fitBounds(bounds);

        let lots = [];
        let markerLayer = L.layerGroup().addTo(map);

        const msgEl = document.getElementById("msg");
        const debugEl = document.getElementById("debug");

        function setMsg(t) { msgEl.textContent = t; }
        function setDebug(obj) { debugEl.textContent = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2); }

        function statusColor(status) {
            switch (status) {
                case "Reserved": return "#d29922";
                case "Sold": return "#1f6feb";
                case "ComingSoon": return "#ff4d8d";
                default: return "#3fb950";
            }
        }

        function normToLatLng(lot) {
            const px = Number(lot.x) * imageWidth;
            const py = Number(lot.y) * imageHeight;
            return [py, px];
        }

        function renderMarkers() {
            markerLayer.clearLayers();

            for (const lot of lots) {
                if (lot.x == null || lot.y == null) continue;

                const c = L.circleMarker(normToLatLng(lot), {
                    radius: 6,          // tamaño mínimo visible
                    weight: 2,
                    color: "#0f1419",
                    fillColor: statusColor(lot.status),
                    fillOpacity: 1
                });

                c.bindTooltip(`${lot.displayCode} (${lot.status})`, { direction: "top", offset: [0, -6], opacity: 0.9 });
                c.on("click", () => selectLot(lot.displayCode, true));
                c.addTo(markerLayer);
            }
        }

        async function fetchJsonNoCache(url) {
            const res = await fetch(url, { cache: "no-store", headers: { "Cache-Control": "no-cache" } });
            return res;
        }

        async function loadLots(keepSelection = true) {
            const res = await fetchJsonNoCache(`/api/projects/${projectKey}/lots`);
            if (!res.ok) { setMsg(`No se pudieron cargar lotes. HTTP ${res.status}`); return; }

            lots = await res.json();

            const sel = document.getElementById("lotSelect");
            const current = sel.value;

            sel.innerHTML = "";
            for (const l of lots) {
                const opt = document.createElement("option");
                opt.value = l.displayCode;
                opt.textContent = `${l.displayCode} (${l.areaM2 ?? ""} m²)`;
                sel.appendChild(opt);
            }

            if (keepSelection && current) sel.value = current;

            syncStatusSelect();
            renderMarkers();

            const withPoint = lots.filter(x => x.x != null && x.y != null).length;
            setMsg(`Cargados ${lots.length} lotes. Con punto: ${withPoint}`);
        }

        function getSelectedLot() {
            const code = document.getElementById("lotSelect").value;
            return lots.find(x => x.displayCode === code);
        }

        function syncStatusSelect() {
            const lot = getSelectedLot();
            if (!lot) return;
            document.getElementById("statusSelect").value = lot.status;
        }

        function selectLot(displayCode, focus) {
            const sel = document.getElementById("lotSelect");
            sel.value = displayCode;
            syncStatusSelect();

            if (focus) {
                const lot = getSelectedLot();
                if (lot && lot.x != null && lot.y != null) {
                    map.setView(normToLatLng(lot), Math.max(map.getZoom(), 0));
                }
            }
        }

        // Click en mapa => guarda posición del lote seleccionado
        map.on('click', async (e) => {
            const lot = getSelectedLot();
            if (!lot) return;

            const x = e.latlng.lng / imageWidth;
            const y = e.latlng.lat / imageHeight;

            const res = await fetch(`/api/admin/projects/${projectKey}/lots/${encodeURIComponent(lot.displayCode)}/position`, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "Cache-Control": "no-cache" },
                body: JSON.stringify({ x, y })
            });

            if (!res.ok) {
                const body = await res.text().catch(() => "");
                setMsg(`Error guardando posición. HTTP ${res.status}. ${body}`.slice(0, 500));
                return;
            }

            const updated = await res.json().catch(() => null);
            setDebug({ savedPosition: updated });

            await loadLots(true);
            setMsg(`Posición guardada para ${lot.displayCode}`);
        });

        document.getElementById("lotSelect").addEventListener("change", () => {
            syncStatusSelect();
        });

        // Guardar estado
        document.getElementById("saveStatus").addEventListener("click", async (ev) => {
            ev.preventDefault();
            const lot = getSelectedLot();
            if (!lot) return;

            const status = document.getElementById("statusSelect").value;

            const res = await fetch(`/api/admin/projects/${projectKey}/lots/${encodeURIComponent(lot.displayCode)}/status`, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "Cache-Control": "no-cache" },
                body: JSON.stringify({ status })
            });

            if (!res.ok) {
                const body = await res.text().catch(() => "");
                setMsg(`Error guardando estado. HTTP ${res.status} ${res.statusText}. ${body}`.slice(0, 500));
                return;
            }

            // IMPORTANTE: usamos la respuesta del servidor para confirmar qué se guardó
            const updated = await res.json().catch(() => null);
            setDebug({ savedStatusResponse: updated });

            // Recargar y redibujar markers (colores)
            await loadLots(true);

            // Mostrar confirmación
            setMsg(`Servidor guardó: ${updated?.displayCode ?? lot.displayCode} = ${updated?.status ?? status}`);
        });

        // Import TXT
        document.getElementById("importBtn").addEventListener("click", async (ev) => {
            ev.preventDefault();
            const txt = document.getElementById("txt").value;
            if (!txt.trim()) { setMsg("Pega el TXT primero."); return; }

            const res = await fetch(`/api/admin/projects/${projectKey}/import-txt`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Cache-Control": "no-cache" },
                body: JSON.stringify({ txt })
            });

            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
                const body = await res.text().catch(() => "");
                setMsg(`Error importando TXT. HTTP ${res.status}. ${body}`.slice(0, 500));
                return;
            }

            setDebug({ importResult: data });
            await loadLots(false);
            setMsg(`Importado OK. Procesados: ${data.insertedOrUpdated ?? "?"}`);
        });

        // Botones
        document.getElementById("refreshBtn").addEventListener("click", async (ev) => {
            ev.preventDefault();
            await loadLots(true);
            setMsg("Actualizado.");
        });

        document.getElementById("focusBtn").addEventListener("click", (ev) => {
            ev.preventDefault();
            const lot = getSelectedLot();
            if (lot && lot.x != null && lot.y != null) {
                map.setView(normToLatLng(lot), Math.max(map.getZoom(), 0));
            } else {
                setMsg("Este lote aún no tiene punto guardado.");
            }
        });

        // Debug: consulta el lote directamente al admin endpoint (si lo agregaste en Program.cs)
        document.getElementById("debugBtn").addEventListener("click", async (ev) => {
            ev.preventDefault();
            const lot = getSelectedLot();
            if (!lot) return;

            const res = await fetchJsonNoCache(`/api/admin/projects/${projectKey}/lots/${encodeURIComponent(lot.displayCode)}`);
            const text = await res.text().catch(() => "");
            setDebug({ debugEndpointStatus: res.status, body: text });
            setMsg("Debug listo (abajo).");
        });

        loadLots(true);
    </script>
</body>
</html>
