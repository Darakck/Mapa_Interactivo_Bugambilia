<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mapa interactivo - Bugambilia</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        .app {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #1b1f23;
            color: #e6edf3;
        }

        .topbar {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,.08);
            background: #0f1419;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

            .brand img {
                height: 34px;
                width: auto;
                display: block;
            }

            .brand .title {
                font-weight: 600;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

        .content {
            flex: 1;
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 10px;
            padding: 10px;
            min-height: 0;
        }

        .panel {
            background: #0f1419;
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 10px;
            overflow: hidden;
            min-height: 0;
        }

        .panel-header {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        #mapWrap {
            height: 100%;
            padding: 10px;
            background: #0b0f14;
            display: flex;
        }

        #map {
            flex: 1;
            min-height: 320px;
            border: 2px solid rgba(255,255,255,.18);
            border-radius: 12px;
            overflow: hidden;
            background: #0b0f14;
        }

        .badge-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }

        .hiddenPanel {
            display: none;
        }

        .btn-touch {
            padding: 10px 12px;
        }

        /* Leaflet zoom buttons bigger for touch */
        .leaflet-control-zoom a {
            width: 44px !important;
            height: 44px !important;
            line-height: 44px !important;
            font-size: 22px !important;
        }

        /* Modal dark */
        .modal-content.dark {
            background: #2f3945;
            color: #e6edf3;
            border: 1px solid rgba(255,255,255,.12);
        }

        .modal-header.dark, .modal-footer.dark {
            border-color: rgba(255,255,255,.12);
        }

        .modal-body .box {
            border: 1px solid rgba(255,255,255,.18);
            border-radius: 8px;
            padding: 14px;
            background: rgba(0,0,0,.12);
        }

        .kv {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

            .kv b {
                color: #fff;
            }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.18);
            background: rgba(0,0,0,.12);
            font-size: 0.95rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        /* Responsive: en móvil la lista va abajo del mapa */
        @media (max-width: 900px) {
            .content {
                grid-template-columns: 1fr;
            }

            #mapWrap {
                height: 55vh;
            }

            #map {
                min-height: 55vh;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="brand">
                <img src="/assets/Logo-Bugambilia.png" alt="Logo Bugambilia">
                <div class="title">Residencial Bugambilia</div>
            </div>

            <div class="d-flex align-items-center gap-2">
                <button id="toggleListBtn" class="btn btn-sm btn-outline-light btn-touch">Ocultar lotes</button>
                <a href="/admin/login.html" class="btn btn-sm btn-outline-secondary btn-touch">Editor</a>
            </div>
        </div>

        <div class="content">
            <div id="listPanel" class="panel">
                <div class="panel-header">
                    <strong>Disponibles</strong>
                    <span class="text-secondary small" id="availCount">0</span>
                </div>
                <div class="p-2" style="height:100%; overflow:auto;">
                    <input id="search" class="form-control form-control-sm mb-2" placeholder="Buscar (A-1, B-10...)">
                    <div id="lotsList" class="list-group list-group-flush"></div>
                </div>
            </div>

            <div class="panel">
                <div id="mapWrap">
                    <div id="map"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="lotModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content dark">
                <div class="modal-header dark">
                    <h5 class="modal-title" id="lotModalTitle">Lote</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <div class="box">
                        <div class="mb-2 text-uppercase" style="font-size:0.85rem; opacity:.85;">Características del Lote</div>
                        <div class="kv mb-3">
                            <div>Área m²: <b id="m2Val">-</b></div>
                            <div>Varas²: <b id="v2Val">-</b></div>
                        </div>
                        <div class="mb-2">
                            <span class="status-pill">
                                <span class="status-dot" id="statusDot"></span>
                                <span>Estado:</span>
                                <b id="statusVal">-</b>
                            </span>
                        </div>
                        <div class="mt-3 small text-secondary">
                            Tip: En móvil, toca un lote y el mapa subirá automáticamente.
                        </div>
                    </div>
                </div>
                <div class="modal-footer dark">
                    <button type="button" class="btn btn-outline-light btn-touch" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const projectKey = "bugambilia";
        const imageUrl = "/assets/bugambilia-plan.png";
        const imageWidth = 3072;
        const imageHeight = 2304;

        const map = L.map('map', { crs: L.CRS.Simple, minZoom: -3, maxZoom: 4 });
        const bounds = [[0, 0], [imageHeight, imageWidth]];
        L.imageOverlay(imageUrl, bounds).addTo(map);
        map.fitBounds(bounds);

        let lotsAll = [];
        let markerLayer = L.layerGroup().addTo(map);
        const lotModal = new bootstrap.Modal(document.getElementById("lotModal"));

        let lastVersion = null;

        function isMobile() { return window.matchMedia("(max-width: 900px)").matches; }

        function statusColor(status) {
            switch (status) {
                case "Reserved": return "#d29922";
                case "Sold": return "#1f6feb";
                case "ComingSoon": return "#ff4d8d";
                default: return "#3fb950";
            }
        }

        function statusLabel(status) {
            switch (status) {
                case "Reserved": return "Reservado";
                case "Sold": return "Vendido";
                case "ComingSoon": return "Próximamente";
                default: return "Disponible";
            }
        }

        function normToLatLng(lot) {
            const px = Number(lot.x) * imageWidth;
            const py = Number(lot.y) * imageHeight;
            return [py, px];
        }

        function pointRadius() { return isMobile() ? 10 : 7; }

        function openLotModal(lot) {
            document.getElementById("lotModalTitle").textContent = `Lote: ${lot.displayCode}`;
            document.getElementById("m2Val").textContent = lot.areaM2 != null ? Number(lot.areaM2).toFixed(2) : "-";
            document.getElementById("v2Val").textContent = lot.areaV2 != null ? Number(lot.areaV2).toFixed(2) : "-";
            document.getElementById("statusDot").style.background = statusColor(lot.status);
            document.getElementById("statusVal").textContent = statusLabel(lot.status);
            lotModal.show();
        }

        function focusLot(lot) {
            if (lot.x != null && lot.y != null) map.setView(normToLatLng(lot), Math.max(map.getZoom(), 0));
            if (isMobile()) document.getElementById("map").scrollIntoView({ behavior: "smooth", block: "start" });
        }

        function renderMarkers(lots) {
            markerLayer.clearLayers();
            for (const lot of lots) {
                if (lot.x == null || lot.y == null) continue;

                const c = L.circleMarker(normToLatLng(lot), {
                    radius: pointRadius(),
                    weight: 2,
                    color: "#0f1419",
                    fillColor: statusColor(lot.status),
                    fillOpacity: 1
                });

                c.bindTooltip(lot.displayCode, { direction: "top", offset: [0, -8], opacity: 0.9 });

                c.on("click", () => { focusLot(lot); openLotModal(lot); });
                c.addTo(markerLayer);
            }
        }

        function renderAvailableList(lots) {
            const list = document.getElementById("lotsList");
            const avail = lots.filter(x => x.status === "Available");
            document.getElementById("availCount").textContent = `${avail.length}`;

            list.innerHTML = "";
            for (const lot of avail) {
                const item = document.createElement("button");
                item.className = "list-group-item list-group-item-action";
                item.style.background = "transparent";
                item.style.color = "#e6edf3";
                item.innerHTML = `
            <div class="d-flex justify-content-between">
              <div><span class="badge-dot" style="background:${statusColor(lot.status)}"></span><strong>${lot.displayCode}</strong></div>
              <div class="text-secondary small">${lot.areaM2 ?? ""} m²</div>
            </div>`;

                item.onclick = () => { focusLot(lot); openLotModal(lot); };
                list.appendChild(item);
            }
        }

        async function loadLots() {
            const res = await fetch(`/api/projects/${projectKey}/lots`, { cache: "no-store" });
            lotsAll = await res.json();
            renderAvailableList(lotsAll);
            renderMarkers(lotsAll);
        }

        document.getElementById("search").addEventListener("input", (e) => {
            const q = e.target.value.trim().toLowerCase();
            const filtered = lotsAll.filter(x => x.displayCode.toLowerCase().includes(q));
            renderAvailableList(filtered);
        });

        document.getElementById("toggleListBtn").addEventListener("click", () => {
            const panel = document.getElementById("listPanel");
            const btn = document.getElementById("toggleListBtn");
            const hidden = panel.classList.toggle("hiddenPanel");
            btn.textContent = hidden ? "Mostrar lotes" : "Ocultar lotes";
        });

        window.addEventListener("resize", () => { renderMarkers(lotsAll); });

        // SSE: actualizar al publicar cambios desde el editor
        function startSse() {
            const es = new EventSource("/api/updates/stream");

            es.addEventListener("version", async (ev) => {
                const ver = ev.data;
                if (lastVersion === null) { lastVersion = ver; return; }
                if (ver === lastVersion) return;

                lastVersion = ver;
                await loadLots(); // aqui se quitan de la lista los que ya no estén Available
            });

            es.onerror = () => {
                // si se cae, intenta reconectar después
                setTimeout(startSse, 2000);
                try { es.close(); } catch { }
            };
        }

        loadLots();
        startSse();
    </script>
</body>
</html>
