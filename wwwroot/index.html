<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Interactivo Bugambilia</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div id="map"></div>
    <button id="toggleLotsPanel">Toggle Lots Panel</button>
    <script>
        // Assuming `map` is already initialized
        function toggleLotsPanel() {
            const lotsPanel = document.getElementById('lotsPanel');
            lotsPanel.style.display = lotsPanel.style.display === 'none' ? 'block' : 'none';
            map.invalidateSize();  // Call to update map size
            // Preserve the current Leaflet view with the following function
            const center = map.getCenter();
            const zoom = map.getZoom();
            map.setView(center, zoom);
        }
        document.getElementById('toggleLotsPanel').addEventListener('click', toggleLotsPanel);
    </script>
</body>
</html>
