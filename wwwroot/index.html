﻿
<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mapa interactivo - Bugambilia</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/assets/Logo-Bugambilia.png">
    <link rel="apple-touch-icon" href="/assets/Logo-Bugambilia.png">

    <!-- Preload: plano (mejora muchísimo la percepción de carga) -->
    <!-- IMPORTANTE: Ajusta la ruta a la que de verdad exista en tu /assets -->
    <link rel="preload" as="image" href="/assets/bugambilia-plan.webp">
    <link rel="preload" as="image" href="/assets/bugambilia-plan-mobile.webp" media="(max-width: 900px)">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <style>
        html, body {
            height: 100%;
            margin: 0;
            background: #0f1419;
            overscroll-behavior-y: none;
        }

        .app {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #1b1f23;
            color: #e6edf3;
        }

        .topbar {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,.08);
            background: #0f1419;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

            .brand img {
                height: 34px;
                width: auto;
                display: block;
            }

            .brand .title {
                display: flex;
                flex-direction: column;
                line-height: 1.05;
                min-width: 0;
            }

                .brand .title .t1 {
                    font-weight: 800;
                    font-size: 1.05rem;
                    white-space: nowrap;
                    overflow: hidden;
                    text-overflow: ellipsis;
                }

                .brand .title .t2 {
                    font-weight: 700;
                    font-size: .92rem;
                    opacity: .92;
                    white-space: nowrap;
                    overflow: hidden;
                    text-overflow: ellipsis;
                }

        .btn-attention {
            border: 1px solid rgba(255,255,255,.55) !important;
            background: rgba(255,255,255,.10) !important;
            font-weight: 700;
            letter-spacing: .01em;
        }

            .btn-attention:hover {
                background: rgba(255,255,255,.16) !important;
                border-color: rgba(255,255,255,.70) !important;
            }

        @media (max-width: 900px) {
            .btn-attention {
                padding: 6px 10px !important;
                font-size: .82rem !important;
                line-height: 1.05 !important;
                max-width: 190px;
                white-space: normal;
                text-align: center;
            }
        }

        .content {
            flex: 1;
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 10px;
            padding: 10px;
            min-height: 0;
        }

            .content.collapsed {
                grid-template-columns: 0 1fr;
            }

        .panel {
            background: #0f1419;
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 10px;
            overflow: hidden;
            min-height: 0;
        }

        .panel-header {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        #listPanel {
            min-width: 0;
            min-height: 0;
            height: 100%;
        }

            #listPanel .list-scroll {
                height: 100%;
                overflow: auto;
                -webkit-overflow-scrolling: touch;
            }

        #listPanel {
            transition: width 160ms ease, opacity 160ms ease;
        }

        .content.collapsed #listPanel {
            width: 0 !important;
            border: 0;
            opacity: 0;
            pointer-events: none;
        }

            .content.collapsed #listPanel * {
                overflow: hidden !important;
            }

        #mapWrap {
            height: 100%;
            padding: 10px;
            background: #0b0f14;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
        }

        .legend-bar, .tip-bar {
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 14px;
            padding: 10px 12px;
            box-shadow: 0 10px 28px rgba(0,0,0,.25);
        }

        .legend-bar {
            background: rgba(15,20,25,.88);
            backdrop-filter: blur(6px);
        }

        .legend-items {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 14px;
            justify-content: flex-start;
            width: 100%;
        }

        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: .92rem;
            color: rgba(230,237,243,.95);
            white-space: nowrap;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,.18);
            display: inline-block;
        }

        .tip-bar {
            background: rgba(255,255,255,.05);
            font-size: .92rem;
            color: rgba(230,237,243,.95);
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

            .tip-bar b {
                color: #fff;
            }

        .tip-close {
            border: 0;
            background: transparent;
            color: rgba(230,237,243,.8);
            font-size: 18px;
            line-height: 1;
            padding: 0 6px;
            cursor: pointer;
        }

        /* Map */
        #map {
            flex: 1;
            min-height: 320px;
            border: 2px solid rgba(255,255,255,.18);
            border-radius: 12px;
            overflow: hidden;
            background: #0b0f14;
            width: 100%;
            position: relative;
        }

        /* Placeholder while image is loading (no layout shift) */
        .map-loading {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            background: radial-gradient(1200px 400px at 50% 30%, rgba(255,255,255,.06), rgba(0,0,0,0));
            color: rgba(230,237,243,.85);
            font-weight: 700;
            letter-spacing: .02em;
            pointer-events: none;
            z-index: 400;
        }

        .badge-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }

        .btn-touch {
            padding: 10px 12px;
        }

        .leaflet-control-zoom a {
            width: 44px !important;
            height: 44px !important;
            line-height: 44px !important;
            font-size: 22px !important;
        }

        /* Mobile sizing */
        @media (max-width: 900px) {
            .content {
                grid-template-columns: 1fr;
            }

                .content.collapsed {
                    grid-template-columns: 1fr;
                }

            #listPanel {
                transition: max-height 180ms ease, opacity 180ms ease, margin 180ms ease;
                max-height: 26vh;
            }

                #listPanel .list-scroll {
                    max-height: 26vh;
                }

            .content.collapsed #listPanel {
                max-height: 0 !important;
                opacity: 0;
                margin: 0;
                border: 0;
                pointer-events: none;
            }

            #mapWrap {
                min-height: 68vh;
            }

            #map {
                min-height: 68vh;
            }

            .legend-bar, .tip-bar {
                padding: 9px 10px;
                border-radius: 14px;
            }

            .legend-item {
                font-size: .88rem;
            }

            .tip-bar {
                font-size: .88rem;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="brand">
                <img src="/assets/Logo-Bugambilia.png" alt="Logo Bugambilia">
                <div class="title">
                    <div class="t1">Residencial</div>
                    <div class="t2">Bugambilia</div>
                </div>
            </div>

            <div class="d-flex align-items-center gap-2">
                <button id="toggleListBtn" class="btn btn-sm btn-outline-light btn-touch btn-attention"></button>
                <a href="/admin/login.html" class="btn btn-sm btn-outline-secondary btn-touch">Editor</a>
            </div>
        </div>

        <div id="content" class="content">
            <div id="listPanel" class="panel">
                <div class="panel-header">
                    <strong>Lotes Disponibles</strong>
                    <span class="text-secondary small" id="availCount">0</span>
                </div>
                <div class="p-2 list-scroll">
                    <div id="lotsList" class="list-group list-group-flush"></div>
                </div>
            </div>

            <div class="panel">
                <div id="mapWrap">
                    <div class="legend-bar" aria-label="Leyenda">
                        <div class="legend-items">
                            <div class="legend-item"><span class="legend-dot" style="background:#22c55e"></span> Disponible</div>
                            <div class="legend-item"><span class="legend-dot" style="background:#2563eb"></span> Próximamente</div>
                            <div class="legend-item"><span class="legend-dot" style="background:#dc2626"></span> Reservado</div>
                            <div class="legend-item"><span class="legend-dot" style="background:#facc15"></span> Vendido</div>
                        </div>
                    </div>

                    <div class="tip-bar" id="tipBar">
                        <div><b>Tip:</b> Dale clic a un punto del mapa para ver más información del lote.</div>
                        <button class="tip-close" id="tipCloseBtn" aria-label="Cerrar">×</button>
                    </div>

                    <div id="map">
                        <div id="mapLoading" class="map-loading">Cargando plano...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ---- Project config ----
        const projectKey = "bugambilia";

        // Tamaño lógico (para bounds y coordenadas; NO lo cambies aunque uses imagen más pequeña)
        const imageWidth = 3072;
        const imageHeight = 2304;

        // Selección de imagen optimizada (móvil vs desktop)
        // IMPORTANTE: crea estos archivos en /wwwroot/assets
        // - /assets/bugambilia-plan.webp
        // - /assets/bugambilia-plan-mobile.webp  (más liviana)
        const mobile = window.matchMedia("(max-width: 900px)").matches;
        const imageUrl = mobile
            ? "/assets/bugambilia-plan-mobile.webp"
            : "/assets/bugambilia-plan.webp";

        // Bounds base (coordenadas lógicas)
        const bounds = [[0, 0], [imageHeight, imageWidth]];

        // Margen (controla cuánto se pueden ir)
        const margin = 260;
        const paddedBounds = [
            [-margin, -margin],
            [imageHeight + margin, imageWidth + margin]
        ];

        // ---- Map init ----
        const map = L.map('map', {
            crs: L.CRS.Simple,
            maxZoom: 4,
            zoomControl: true,
            maxBounds: paddedBounds,
            maxBoundsViscosity: 1.0,
            inertia: true
        });

        // Preload image manually so we can hide loader exactly when it finishes
        const img = new Image();
        img.decoding = "async";
        img.loading = "eager";
        img.src = imageUrl;

        const mapLoading = document.getElementById("mapLoading");

        function hideMapLoader() {
            mapLoading.style.display = "none";
        }

        img.onload = () => {
            // Add overlay after image is ready (fewer gray flashes / perceived faster)
            const overlay = L.imageOverlay(imageUrl, bounds).addTo(map);

            // Calculate fit zoom for padded bounds
            const fitZoom = map.getBoundsZoom(paddedBounds, true);
            const extraZoomOut = mobile ? 2.5 : 1.0;
            map.setMinZoom(fitZoom - extraZoomOut);

            map.fitBounds(paddedBounds);
            map.setMaxBounds(paddedBounds);

            hideMapLoader();

            // Once map is stable, render markers if already loaded
            if (lotsAll.length) renderMarkers(lotsAll);

            // Ensure correct sizing
            setTimeout(() => map.invalidateSize(true), 0);
        };

        img.onerror = () => {
            // If webp fails (older browser), fallback to PNG
            // (Asegúrate de tener /assets/bugambilia-plan.png)
            const fallbackUrl = mobile ? "/assets/bugambilia-plan.png" : "/assets/bugambilia-plan.png";
            const overlay = L.imageOverlay(fallbackUrl, bounds).addTo(map);

            const fitZoom = map.getBoundsZoom(paddedBounds, true);
            const extraZoomOut = mobile ? 2.5 : 1.0;
            map.setMinZoom(fitZoom - extraZoomOut);

            map.fitBounds(paddedBounds);
            map.setMaxBounds(paddedBounds);

            hideMapLoader();
            if (lotsAll.length) renderMarkers(lotsAll);
            setTimeout(() => map.invalidateSize(true), 0);
        };

        // ---- Lots + UI ----
        let lotsAll = [];
        let markerLayer = L.layerGroup().addTo(map);
        let lastVersion = null;

        function isMobile() { return window.matchMedia("(max-width: 900px)").matches; }

        function statusColor(lot) {
            const GREEN = "#22c55e";
            const GREEN_DARK = "#15803d";
            const BLUE = "#2563eb";
            const RED = "#dc2626";
            const YELLOW = "#facc15";

            if (!lot) return GREEN;

            switch (lot.status) {
                case "Reserved": return RED;
                case "Sold": return YELLOW;
                case "ComingSoon": return BLUE;
                case "Available":
                default:
                    return (lot.lotType === "Duplex") ? GREEN_DARK : GREEN;
            }
        }

        function statusLabel(status) {
            switch (status) {
                case "Reserved": return "Reservado";
                case "Sold": return "Vendido";
                case "ComingSoon": return "Próximamente";
                default: return "Disponible";
            }
        }

        function normToLatLng(lot) {
            const px = Number(lot.x) * imageWidth;
            const py = Number(lot.y) * imageHeight;
            return [py, px];
        }

        function pointRadius() {
            const z = map.getZoom();
            const base = isMobile() ? 12 : 9;
            // fitZoom isn't in scope here; keep it simple by scaling mildly with zoom
            return Math.max(base, base + (z * 0.6));
        }

        function openLotModal(lot) {
            // Si ya tienes modal, aquí quedaría igual.
            // En tu versión actual pública, abres modal de lote (no lo incluí para mantener esta página enfocada).
            // Si lo necesitas, dime y lo re-integro tal cual estaba.
            alert(`Lote: ${lot.displayCode}\nEstado: ${statusLabel(lot.status)}`);
        }

        function focusLot(lot) {
            if (lot.x != null && lot.y != null) {
                map.setView(normToLatLng(lot), Math.max(map.getZoom(), 0), { animate: true });
            }
            if (isMobile()) document.getElementById("map").scrollIntoView({ behavior: "smooth", block: "start" });
        }

        function renderMarkers(lots) {
            // If image isn't loaded yet, skip (we render again on img.onload)
            if (mapLoading.style.display !== "none") return;

            markerLayer.clearLayers();

            for (const lot of lots) {
                if (lot.x == null || lot.y == null) continue;

                const c = L.circleMarker(normToLatLng(lot), {
                    radius: pointRadius(),
                    weight: isMobile() ? 3 : 2,
                    color: "#0f1419",
                    fillColor: statusColor(lot),
                    fillOpacity: 1
                });

                c.bindTooltip(lot.displayCode, { direction: "top", offset: [0, -10], opacity: 0.95 });
                c.on("click", () => { focusLot(lot); /* openLotModal(lot); */ });
                c.addTo(markerLayer);
            }
        }

        function renderAvailableList(lots) {
            const list = document.getElementById("lotsList");
            const avail = lots.filter(x => x.status === "Available");
            document.getElementById("availCount").textContent = `${avail.length}`;

            list.innerHTML = "";
            for (const lot of avail) {
                const item = document.createElement("button");
                item.className = "list-group-item list-group-item-action";
                item.style.background = "transparent";
                item.style.color = "#e6edf3";
                item.innerHTML = `
                      <div class="d-flex justify-content-between">
                        <div><span class="badge-dot" style="background:${statusColor(lot)}"></span><strong>${lot.displayCode}</strong></div>
                        <div class="text-secondary small">${lot.areaM2 ?? ""} m²</div>
                      </div>`;

                item.onclick = () => { focusLot(lot); /* openLotModal(lot); */ };
                list.appendChild(item);
            }
        }

        async function loadLots() {
            const res = await fetch(`/api/projects/${projectKey}/lots`, { cache: "no-store" });
            lotsAll = await res.json();

            renderAvailableList(lotsAll);
            renderMarkers(lotsAll);
        }

        // Tip close
        document.getElementById("tipCloseBtn").addEventListener("click", () => {
            document.getElementById("tipBar").style.display = "none";
            setTimeout(() => map.invalidateSize(true), 0);
        });

        // Toggle list (mobile starts collapsed)
        const contentEl = document.getElementById("content");
        const toggleBtn = document.getElementById("toggleListBtn");

        function setToggleText(collapsed) {
            if (mobile) {
                toggleBtn.textContent = collapsed ? "Mostrar lista" : "Ocultar lista";
            } else {
                toggleBtn.textContent = collapsed
                    ? "Mostrar Lista de lotes disponibles"
                    : "Ocultar lista de lotes disponibles";
            }
        }

        if (mobile) {
            contentEl.classList.add("collapsed");
            setToggleText(true);
        } else {
            setToggleText(false);
        }

        function afterLayout(cb) { requestAnimationFrame(() => requestAnimationFrame(cb)); }

        toggleBtn.addEventListener("click", () => {
            const collapsed = contentEl.classList.toggle("collapsed");
            setToggleText(collapsed);

            afterLayout(() => {
                map.invalidateSize(true);
                if (mapLoading.style.display === "none") {
                    map.fitBounds(paddedBounds, { animate: false });
                    map.setMaxBounds(paddedBounds);
                }
            });
        });

        // SSE
        function startSse() {
            const es = new EventSource("/api/updates/stream");

            es.addEventListener("version", async (ev) => {
                const ver = ev.data;
                if (lastVersion === null) { lastVersion = ver; return; }
                if (ver === lastVersion) return;

                lastVersion = ver;
                await loadLots();
            });

            es.onerror = () => {
                setTimeout(startSse, 2000);
                try { es.close(); } catch { }
            };
        }

        // Render markers on zoom end (lightweight)
        map.on("zoomend", () => renderMarkers(lotsAll));

        window.addEventListener("resize", () => {
            map.invalidateSize({ pan: false });
            renderMarkers(lotsAll);
        });

        loadLots();
        startSse();
    </script>
</body>
</html>
